<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Organiza tu día</title>

    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="TaskFlow">

    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- Iconos -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>TaskFlow</h1>
            <p>Organiza tus tareas diarias</p>
        </header>

        <div class="task-input">
            <input type="text" id="taskInput" placeholder="Escribe una tarea...">
            <button id="addTaskBtn">Agregar</button>
        </div>

        <ul id="taskList" class="task-list"></ul>

        <p id="emptyMessage" class="empty-message">
            No hay tareas pendientes.
        </p>

        <div class="stats">
            <p>Total: <span id="totalTasks">0</span></p>
            <p>Pendientes: <span id="pendingTasks">0</span></p>
            <p>Completadas: <span id="completedTasks">0</span></p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
